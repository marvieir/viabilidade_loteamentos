# Pré-Viabilidade de Loteamento — dois serviços (CLAUDE.md / ARCHITECTURE.md §3).
# Portas: backend > 8700, frontend > 3700.
services:
  api:
    build: ./backend
    ports:
      - "8700:8700"
    # Segredos/credenciais da máquina (ex.: ANTHROPIC_API_KEY da Fase 1.8) entram por aqui —
    # o arquivo é gitignored e NÃO vai na imagem. Sem isto, a extração da LUOS responde 503.
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: "http://localhost:3700"
      # Liga a detecção de município por malha real (Fase 1.7). O arquivo entra por volume
      # (abaixo) — é grande e gitignored, não vai na imagem.
      MALHA_IBGE_PATH: "/data/malha_ibge.geojson"
      # Liga a aquisição ambiental real (Fase 2.1 — SIGMINE/ANA/ICMBio/ANEEL).
      AMBIENTAL_FONTE_REAL: "1"
      # Fase 2.2 — área verde (ESA WorldCover, sem login). Recorte gerado por
      # scripts/baixar_worldcover.py e montado no volume abaixo. Comente esta linha e o
      # volume se ainda não tiver o arquivo (a vegetação degrada honesta, sem descontar).
      VEGETACAO_RASTER_PATH: "/data/verde.tif"
      # Fase 1.8 — onde os perfis municipais CONFIRMADOS da LUOS persistem (volume abaixo).
      PERFIL_MUNICIPAL_DIR: "/data/perfis-municipais"
    volumes:
      # Monta a malha gerada no host (python -m scripts.baixar_malha_ibge) no container.
      # O arquivo PRECISA existir antes do `up`, senão o bind cria um diretório vazio.
      - ./backend/app/perfis/malha_ibge.geojson:/data/malha_ibge.geojson:ro
      # Fase 2.2 — raster de vegetação (recorte WorldCover). O arquivo PRECISA existir
      # antes do `up` (gere com scripts/baixar_worldcover.py), senão o bind cria dir vazio.
      - ./backend/app/perfis/verde.tif:/data/verde.tif:ro
      # Fase 1.8 — perfis confirmados da LUOS (dado do operador). Bind no host → sobrevivem
      # a rebuilds e ficam inspecionáveis em backend/app/perfis/municipais/.
      - ./backend/app/perfis/municipais:/data/perfis-municipais
      # CA corporativa (ex.: Cisco Secure Access) para religar o TLS sob inspeção: coloque o
      # PEM em backend/certs/corp-ca.pem e defina LUOS_CA_BUNDLE=/certs/corp-ca.pem no .env.
      - ./backend/certs:/certs:ro
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:8700"
    ports:
      - "3700:3700"
    depends_on:
      - api
    restart: unless-stopped
