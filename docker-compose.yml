# Pré-Viabilidade de Loteamento — dois serviços (CLAUDE.md / ARCHITECTURE.md §3).
# Portas: backend > 8700, frontend > 3700.
services:
  api:
    build: ./backend
    ports:
      - "8700:8700"
    # Segredos/credenciais da máquina (ex.: ANTHROPIC_API_KEY da Fase 1.8) entram por aqui —
    # o arquivo é gitignored e NÃO vai na imagem. Sem isto, a extração da LUOS responde 503.
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      CORS_ORIGINS: "http://localhost:3700"
      # Fase 12 — banco multi-tenant (Postgres no serviço `db` abaixo). O motor é agnóstico
      # ao banco; só esta URL muda (SQLite no dev local, Postgres no Compose/produção).
      DATABASE_URL: "postgresql+psycopg://viabilidade:${POSTGRES_PASSWORD:-viabilidade}@db:5432/viabilidade"
      # Segredos JWT — DEFINA por env/.env em produção (rotacionáveis). Sem isto, cai num
      # default inseguro só p/ dev. Diferencie os dois (access ≠ refresh).
      JWT_SECRET: "${JWT_SECRET:-dev-inseguro-troque-em-producao}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-dev-inseguro-refresh-troque}"
      # Em produção (HTTPS) ligue COOKIE_SECURE=1 para o refresh viajar só por TLS.
      COOKIE_SECURE: "${COOKIE_SECURE:-0}"
      # Liga a detecção de município por malha real (Fase 1.7). O arquivo entra por volume
      # (abaixo) — é grande e gitignored, não vai na imagem.
      MALHA_IBGE_PATH: "/data/malha_ibge.geojson"
      # Liga a aquisição ambiental real (Fase 2.1 — SIGMINE/ANA/ICMBio/ANEEL).
      AMBIENTAL_FONTE_REAL: "1"
      # Fase 2.2 — área verde (ESA WorldCover 10m, sem login). PADRÃO = modo AUTOMÁTICO:
      # a API lê o COG público por HTTP e escolhe o tile pela posição da gleba, então
      # funciona para QUALQUER KMZ sem recorte manual. Requer egress ao bucket público
      # (esa-worldcover.s3.eu-central-1.amazonaws.com). Sem egress, desligue com
      # VEGETACAO_WORLDCOVER_AUTO: "0" e aponte um recorte local em VEGETACAO_RASTER_PATH
      # (gere com scripts/baixar_worldcover.py e descomente o volume verde.tif abaixo).
      VEGETACAO_WORLDCOVER_AUTO: "1"
      # VEGETACAO_RASTER_PATH: "/data/verde.tif"   # offline/override (recorte por gleba)
      # Fase 2.5 — declividade via DEM (Copernicus GLO-30 Public, SEM chave). PADRÃO = COG
      # público por HTTP, tile escolhido pela posição da gleba — qualquer KMZ, sem recorte.
      # Requer egress a copernicus-dem-30m.s3.eu-central-1.amazonaws.com. Desligue com
      # DEM_FONTE: "none"; fallback offline com DEM_RASTER_PATH; OpenTopography (opcional)
      # com DEM_FONTE: "opentopography" + OPENTOPOGRAPHY_API_KEY.
      DEM_FONTE: "copernicus_auto"
      # Fase 1.8 — onde os perfis municipais CONFIRMADOS da LUOS persistem (volume abaixo).
      PERFIL_MUNICIPAL_DIR: "/data/perfis-municipais"
      # Fase 3 — fichas jurídicas confirmadas + anexos do checklist (Fase 3.C) — bind abaixo.
      JURIDICO_DIR: "/data/juridico"
    volumes:
      # Monta a malha gerada no host (python -m scripts.baixar_malha_ibge) no container.
      # O arquivo PRECISA existir antes do `up`, senão o bind cria um diretório vazio.
      - ./backend/app/perfis/malha_ibge.geojson:/data/malha_ibge.geojson:ro
      # Dados ambientais (CAR/Mata Atlântica/etc.) — portável: por padrão usa ./dados-ambientais
      # do projeto; aponte p/ outra pasta com DADOS_AMBIENTAIS no .env (ex.: ~/dados-ambientais).
      # Os AMBIENTAL_*_PATH (backend/.env) devem apontar p/ /data/ambiental/<arquivo>.
      - ${DADOS_AMBIENTAIS:-./dados-ambientais}:/data/ambiental:ro
      # Fase 2.2 — recorte LOCAL de vegetação (só no modo offline/override). No modo
      # automático (padrão) este volume NÃO é usado; descomente apenas se você gerar um
      # verde.tif (scripts/baixar_worldcover.py) e setar VEGETACAO_RASTER_PATH acima — o
      # arquivo PRECISA existir antes do `up`, senão o bind cria um diretório vazio.
      # - ./backend/app/perfis/verde.tif:/data/verde.tif:ro
      # Fase 1.8 — perfis confirmados da LUOS (dado do operador). Bind no host → sobrevivem
      # a rebuilds e ficam inspecionáveis em backend/app/perfis/municipais/.
      - ./backend/app/perfis/municipais:/data/perfis-municipais
      # Fase 3 — fichas jurídicas + anexos do checklist. Bind no host → sobrevivem a rebuilds.
      - ./backend/app/perfis/juridico:/data/juridico
      # CA corporativa (ex.: Cisco Secure Access) para religar o TLS sob inspeção: coloque o
      # PEM em backend/certs/corp-ca.pem e defina LUOS_CA_BUNDLE=/certs/corp-ca.pem no .env.
      - ./backend/certs:/certs:ro
    restart: unless-stopped

  # Fase 12 — Postgres (fonte de verdade dos usuários/análises). Volume `pgdata`
  # persiste entre rebuilds; healthcheck garante que o `api` só sobe com o banco pronto.
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "viabilidade"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-viabilidade}"
      POSTGRES_DB: "viabilidade"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viabilidade -d viabilidade"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:8700"
    ports:
      - "3700:3700"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
